<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Защитный код: Резервное копирование</title><link rel="stylesheet" href="test.css"></head><body><main class="app"><section id="startScreen" class="screen card active"><div class="badge">Защитный код</div><h1>Резервное копирование</h1><p class="lead">Проверь знания о бэкапах, правиле 3-2-1 и цифровом следе.</p><input id="studentName" placeholder="Имя агента"><button id="startBtn" class="btn primary">💾 Начать тест</button></section><section id="quizScreen" class="screen card"><div class="topline"><span id="progressText"></span><span id="scoreText"></span></div><div class="progress"><div id="progressBar"></div></div><h2 id="questionTitle"></h2><p id="questionText"></p><div id="answers"></div><div id="feedback" class="hidden"></div><button id="nextBtn" class="btn primary hidden">Дальше</button></section><section id="resultScreen" class="screen card"><h1 id="resultTitle"></h1><div id="finalScore"></div><p id="resultMessage"></p><button id="retryBtn" class="btn primary">🔁 Пройти ещё раз</button></section></main><script src="test.js"></script></body></html>
